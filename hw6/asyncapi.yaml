asyncapi: 2.6.0
info:
  title: ML Inference Pipeline (Redis Streams)
  version: 1.0.0
  description: >
    Конвейер из трёх событий, обменивающихся через Redis Lists.
    1. `text:preprocess` – приём сырого текста.
    2. `text:tokens` – токенизированные данные.
    3. `result:<correlation_id>` – готовые эмбеддинги.
servers:
  redis:
    url: localhost:6379
    protocol: redis
channels:
  text:preprocess:
    publish:
      message:
        $ref: '#/components/messages/TextRequest'
  text:tokens:
    subscribe:
      message:
        $ref: '#/components/messages/TokenizedRequest'
  result/{correlation_id}:
    publish:
      message:
        $ref: '#/components/messages/PredictionResult'
components:
  messages:
    TextRequest: ...
    TokenizedRequest: ...
    PredictionResult: ...