asyncapi: 2.6.0
info:
  title: ML Inference Pipeline (Redis + gRPC)
  version: 1.0.0
  description: >
    Событийно-ориентированная архитектура с цепочкой из трёх этапов:
    1) text.preprocess – отправка запроса в Redis-очередь "text:preprocess"
    2) model.inference – Worker читает очередь, батчит и выполняет инференс
    3) result.persist – Worker вызывает gRPC SendResult у Gateway, результат возвращается клиенту
servers:
  grpc-gateway:
    url: grpc-gateway-service:50051
    protocol: grpc
channels:
  text/preprocess:
    description: Очередь Redis List для запросов на обработку
    publish:
      message:
        $ref: '#/components/messages/TextRequest'
    subscribe:
      message:
        $ref: '#/components/messages/TextRequest'
components:
  messages:
    TextRequest:
      payload:
        type: object
        properties:
          correlation_id:
            type: string
          text:
            type: string
    PredictionResponse:
      payload:
        type: object
        properties:
          correlation_id:
            type: string
          embedding:
            type: array
            items:
              type: number
