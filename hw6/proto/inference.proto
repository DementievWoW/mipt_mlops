syntax = "proto3";

package inference;

service InferencePipeline {
  // Клиент отправляет поток сообщений, сервер отвечает потоком результатов.
  rpc StreamPredictions(stream PredictionRequest) returns (stream PredictionResponse);
}

message PredictionRequest {
  string correlation_id = 1;
  string text = 2;
}

message PredictionResponse {
  string correlation_id = 1;
  repeated float embedding = 2;   // вектор эмбеддинга (768 чисел)
}