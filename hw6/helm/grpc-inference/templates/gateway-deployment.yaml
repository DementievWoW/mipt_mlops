apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grpc-inference.fullname" . }}-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "grpc-inference.name" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "grpc-inference.name" . }}-gateway
    spec:
      containers:
      - name: gateway
        image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
        imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
        ports:
        - containerPort: 50051
          name: grpc
