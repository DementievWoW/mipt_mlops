apiVersion: v1
kind: Service
metadata:
  name: {{ include "grpc-inference.fullname" . }}
  labels:
    app: {{ include "grpc-inference.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: grpc
    protocol: TCP
    name: grpc
  selector:
    app: {{ include "grpc-inference.name" . }}