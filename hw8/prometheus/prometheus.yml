global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ml_service
    metrics_path: /metrics
    static_configs:
      - targets: ["ml_service:8000"]
        labels:
          service: ml_service
          env: dev
