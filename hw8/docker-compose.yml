services:
  ml_service:
    build: ./ml_service
    container_name: hw8_ml_service
    environment:
      MODEL_VERSION: iris-logreg-v1
    ports:
      - "8000:8000"
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: hw8_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - ml_service
      - alertmanager
    networks:
      - monitoring
    restart: unless-stopped

  alertmanager-init:
    image: alpine:3.20
    container_name: hw8_alertmanager_init
    env_file:
      - .env
    volumes:
      - ./alertmanager/alertmanager.yml.template:/template/alertmanager.yml.template:ro
      - alertmanager_config:/config
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        apk add --no-cache gettext >/dev/null
        envsubst '$$TELEGRAM_BOT_TOKEN $$TELEGRAM_CHAT_ID' \
          < /template/alertmanager.yml.template \
          > /config/alertmanager.yml
        echo "Rendered alertmanager.yml:"
        cat /config/alertmanager.yml
    restart: "no"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hw8_alertmanager
    depends_on:
      alertmanager-init:
        condition: service_completed_successfully
    volumes:
      - alertmanager_config:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: hw8_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  alertmanager_config:
