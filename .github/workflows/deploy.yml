name: Model Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: hw7

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/ml-service
          TAG=${{ github.sha }}
          docker build \
            --build-arg MODEL_VERSION=${{ vars.MODEL_VERSION || 'v1.1.0' }} \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Health check
        run: |
          docker run -d --name smoke -p 8000:8000 \
            ghcr.io/${{ github.repository }}/ml-service:${{ github.sha }}
          for i in {1..15}; do
            sleep 2
            if curl -sf http://localhost:8000/health; then
              echo "OK"; exit 0
            fi
          done
          docker logs smoke
          exit 1
