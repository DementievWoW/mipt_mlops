services:
  ml-blue:
    image: ml-service:v1.0.0
    container_name: ml-blue
    environment:
      MODEL_VERSION: v1.0.0
    ports:
      - "8001:8000"
    networks:
      - ml-net

  ml-green:
    build:
      context: .
      args:
        MODEL_VERSION: v1.1.0
    image: ml-service:v1.1.0
    container_name: ml-green
    environment:
      MODEL_VERSION: v1.1.0
    ports:
      - "8002:8000"
    networks:
      - ml-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ml-nginx
    depends_on:
      - ml-blue
      - ml-green
    volumes:
      - ./nginx/nginx.green.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - ml-net

networks:
  ml-net:
